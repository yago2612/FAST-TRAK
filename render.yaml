services:
  - type: web
    name: simple-tracker-whale
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python app.py"
    envVars:
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        value: admin
      - key: SECRET_KEY
        generateValue: true
      - key: MIN_ACCOUNT_VALUE
        value: "250000"
      - key: AUTO_DISCOVERY_ENABLED
        value: "1"
      - key: AUTO_DISCOVERY_INTERVAL
        value: "180"
      - key: AUTO_REFRESH_INTERVAL
        value: "5"
      - key: AUTO_REFRESH_BATCH
        value: "5"
      - key: TRACKED_REFRESH_INTERVAL
        value: "1"
      - key: TRACKED_FILL_SYNC_INTERVAL
        value: "2"
      - key: TRACKED_MAX_WALLETS
        value: "5"
      - key: POSITION_CLOSE_CONFIRMATIONS
        value: "2"
      - key: MARK_WS_ENABLED
        value: "1"
      - key: PRICE_UI_REFRESH_MS
        value: "200"
      - key: FILL_SYNC_ENABLED
        value: "1"
      - key: FILL_SYNC_INTERVAL
        value: "60"
      - key: FILL_SYNC_BATCH
        value: "10"
      - key: FILL_SYNC_TOP_N
        value: "10"
